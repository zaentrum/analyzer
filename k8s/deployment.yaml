apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  namespace: stube
  labels:
    app: analyzer
    value-stream: stube
    component: pipeline
    plane: worker
spec:
  # Start small. Once the per-file pipelines are validated and Whisper is on,
  # bump to 2-3 replicas — Postgres SKIP LOCKED makes the claim path safe.
  replicas: 1
  strategy:
    type: Recreate   # nvidia.com/gpu device plugin counts allocations strictly
  selector:
    matchLabels:
      app: analyzer
  template:
    metadata:
      labels:
        app: analyzer
        value-stream: stube
        component: pipeline
        plane: worker
    spec:
      serviceAccountName: analyzer
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Phase 2b runs CPU-only pipelines (chapters, blackframe, silence) so
      # we don't pin the pod to GPU nodes — the two GPU workers are already
      # fully allocated by ollama + tdarr. When Phase 2c enables Whisper /
      # TransNetV2 we add the GPU request and nodeSelector back; until
      # then any worker can run this.
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: app
          image: zaentrum/analyzer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KATALOG_API_URL
              # Workers point at the CAP Java manager API for both
              # reads + writes (claim + upsert_step). Service URL with
              # no /api suffix; the client prepends "/api/...".
              value: "http://katalog-manager-api.stube.svc.cluster.local"
            - name: OIDC_TOKEN_URL
              value: "https://sso.example.com/realms/zaentrum/protocol/openid-connect/token"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: katalog-oidc
                  key: client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: katalog-oidc
                  key: client-secret
            - name: CLAIM_BATCH_SIZE
              value: "2"
            - name: IDLE_SLEEP_SECONDS
              value: "20"
            # tidb_first sweep tuning. At 0.25 s between items and a
            # batch of 4 the worker averages ~1.5 calls/s — comfortably
            # under TIDB's 30 req / 10 s anonymous ceiling once
            # per-batch claim overhead (~1 s) is amortised in.
            - name: TIDB_FIRST_CLAIM_INTERVAL_SECONDS
              value: "0.25"
            - name: TIDB_FIRST_BATCH_SIZE
              value: "4"
            - name: ENABLE_WHISPER
              value: "false"   # Phase 2c flips this on.
          volumeMounts:
            - name: media
              mountPath: /var/lib/katalog/media
              readOnly: true
            # Packaged CMAF output. RWX so this analyzer pod can write
            # the per-item package tree (init.mp4, seg-NNNNN.m4s,
            # manifest.json) that katalog-stream serves as static files.
            # Backed by a shared NFS export, separate from the read-only
            # source-media export mounted above.
            - name: packages
              mountPath: /var/lib/katalog/packages
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              # ffmpeg blackdetect/silencedetect on a 2h movie burns ~1
              # vCPU for a few minutes; 4 limits is plenty for the
              # CPU-only stack. Phase 2c bumps this and adds back the
              # nvidia.com/gpu: 1 request when Whisper turns on.
              cpu: "4"
              memory: 4Gi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media
        - name: packages
          persistentVolumeClaim:
            claimName: packages
